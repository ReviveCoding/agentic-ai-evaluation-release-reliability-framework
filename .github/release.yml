changelog:
  exclude:
    labels: [ignore-for-release]
  categories:
    - title: Security
      labels: [security]
    - title: Evaluation and reliability
      labels: [evaluation, reliability]
    - title: Features
      labels: [enhancement]
    - title: Fixes
      labels: [bug]
    - title: Dependencies
      labels: [dependencies]
    - title: Other changes
      labels: ["*"]
