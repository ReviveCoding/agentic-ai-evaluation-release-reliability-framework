name: real-data-validation
permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      max_dialogues:
        description: "Maximum dialogues per SGD split for the validation run"
        required: false
        default: "250"

jobs:
  public-sgd-cpu:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            pyproject.toml
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements-dev.txt && pip install -e .
      - name: Download and normalize public SGD
        run: PYTHONPATH=src python -m agentic_eval_framework.data.download_sgd --out-dir data/raw/sgd
      - name: Validate raw dataset contract
        run: PYTHONPATH=src python scripts/00_validate_raw_dataset.py --raw-dir data/raw/sgd --skip-json-inspection
      - name: Run stratified ID and OOD public-data pipeline on CPU
        run: >-
          PYTHONPATH=src python scripts/14_run_stratified_real_data_pipeline.py
          --raw-dir data/raw/sgd
          --backend sklearn
          --max-dialogues ${{ inputs.max_dialogues }}
          --max-ood-dialogues ${{ inputs.max_dialogues }}
      - name: Run regression tests and project audit
        run: make test audit
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        if: always()
        with:
          name: public-sgd-validation-sklearn
          path: |
            reports/
            outputs/*.json
            models/tool_policy/metrics.json
            models/tool_policy/model_manifest.json
