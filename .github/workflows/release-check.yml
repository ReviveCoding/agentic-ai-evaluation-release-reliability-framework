name: release-check

permissions:
  contents: read

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  release-check:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            pyproject.toml
      - run: python -m pip install --upgrade pip build
      - run: pip install -r requirements-dev.txt && pip install -e .
      - run: python -m pytest -q
      - run: python scripts/06_project_audit.py
      - run: python scripts/10_verify_package.py
      - run: python scripts/20_public_release_audit.py
      - run: python -m build
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: agentic-eval-framework-${ github.ref_name }
          path: |
            dist/*
            reports/final_release_manifest.json
            reports/public_release_audit.json
          if-no-files-found: error
