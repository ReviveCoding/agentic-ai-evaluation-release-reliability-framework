name: Feature request
description: Propose a scoped improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation plan
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Evaluation
        - Retrieval
        - Replay
        - Safety
        - Data
        - API/CLI
        - Documentation
        - CI/Packaging
    validations:
      required: true
